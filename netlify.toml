[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "netlify/edge-functions"

[functions]
  node_bundler = "esbuild"

[functions.claude]
  timeout = 26

[functions.history-get]
  timeout = 10

[functions.history-post]
  timeout = 10

[[edge_functions]]
  path = "/api/claude"
  function = "claude"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://accounts.google.com; font-src https://cdn.jsdelivr.net; connect-src 'self' https://generativelanguage.googleapis.com https://accounts.google.com; img-src 'self' data: https://*.googleusercontent.com; frame-src https://accounts.google.com"
